name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: changesets release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # The changesets action either opens/updates a "Version Packages" PR
      # (consuming pending changesets and bumping the version) or, when that
      # PR is merged, runs `publish` to release to npm.
      - name: Create Release PR or publish
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# npm Trusted Publishing (OIDC):
# permissions.id-token: write lets `pnpm changeset publish` authenticate to
# npm without a long-lived NPM_TOKEN secret. To enable:
#   1. Keep this repository public (provenance requires it).
#   2. On npmjs.com -> mf-shield -> Settings -> Publishing access, add a
#      Trusted Publisher pointing at ghondar/mf-shield + release.yml.
#   3. No NPM_TOKEN is needed afterwards; OIDC handles auth and attaches
#      build provenance automatically.
